<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Owner — Warung Pak Budi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0a;
      --surface: #111111;
      --s2:      #1a1a1a;
      --border:  #222222;
      --amber:   #f59e0b;
      --green:   #22c55e;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --text:    #f0f0f0;
      --muted:   #666;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 99;
    }
    .header-left h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .header-left p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--green);
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      padding: 4px 10px;
      border-radius: 20px;
    }
    .dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .refresh-btn {
      background: var(--s2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .refresh-btn:hover { color: var(--text); }

    /* ── MAIN ────────────────────────────────────── */
    main { padding: 24px; max-width: 1200px; margin: 0 auto; }

    /* ── DATE TABS ───────────────────────────────── */
    .date-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--amber);
      color: #000;
      border-color: var(--amber);
      font-weight: 600;
    }

    /* ── STATS GRID ──────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-value.amber { color: var(--amber); }
    .stat-value.green { color: var(--green); }
    .stat-value.blue  { color: var(--blue); }
    .stat-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── GRID LAYOUT ─────────────────────────────── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

    /* ── CARDS ───────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .card-count {
      font-size: 11px;
      color: var(--muted);
      background: var(--s2);
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* ── ORDER LIST ──────────────────────────────── */
    .order-list { max-height: 360px; overflow-y: auto; }
    .order-item {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      transition: background 0.15s;
    }
    .order-item:hover { background: var(--s2); }
    .order-item:last-child { border-bottom: none; }
    .order-nama { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
    .order-menu { font-size: 11px; color: var(--muted); line-height: 1.5; }
    .order-right { text-align: right; flex-shrink: 0; }
    .order-total { font-size: 13px; font-weight: 700; color: var(--amber); }
    .order-time  { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .order-meja  {
      display: inline-block;
      font-size: 10px;
      background: rgba(59,130,246,0.15);
      color: var(--blue);
      border: 1px solid rgba(59,130,246,0.3);
      padding: 1px 6px;
      border-radius: 4px;
      margin-top: 3px;
    }

    /* ── BEST SELLER ─────────────────────────────── */
    .menu-list { padding: 4px 0; }
    .menu-row {
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .menu-row:last-child { border: none; }
    .menu-rank {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--s2);
      font-size: 11px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      flex-shrink: 0;
    }
    .menu-rank.gold   { background: rgba(245,158,11,0.15); color: var(--amber); }
    .menu-rank.silver { background: rgba(148,163,184,0.15); color: #94a3b8; }
    .menu-rank.bronze { background: rgba(180,83,9,0.15); color: #b45309; }
    .menu-name { flex: 1; font-size: 13px; }
    .menu-bar-wrap { width: 80px; height: 4px; background: var(--s2); border-radius: 2px; }
    .menu-bar { height: 4px; background: var(--amber); border-radius: 2px; }
    .menu-count { font-size: 12px; font-weight: 600; color: var(--amber); min-width: 30px; text-align: right; }

    /* ── MEJA TABLE ──────────────────────────────── */
    .meja-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
      padding: 16px;
    }
    .meja-card {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .meja-num { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .meja-orders { font-size: 20px; font-weight: 700; color: var(--blue); }
    .meja-rev { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── EMPTY ───────────────────────────────────── */
    .empty { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }

    /* ── LOADING ─────────────────────────────────── */
    .loading { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }

    /* ── LAST UPDATE ─────────────────────────────── */
    #lastUpdate { font-size: 11px; color: var(--muted); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>📊 Dashboard Owner</h1>
    <p>Warung Pak Budi · Real-time</p>
  </div>
  <div class="header-right">
    <span id="lastUpdate"></span>
    <div class="live-badge"><span class="dot"></span> Live</div>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<main>
  <!-- DATE TABS -->
  <div class="date-tabs" id="dateTabs"></div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Order</div>
      <div class="stat-value blue" id="statOrders">—</div>
      <div class="stat-sub" id="statOrdersSub">hari ini</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pendapatan</div>
      <div class="stat-value amber" id="statRevenue">—</div>
      <div class="stat-sub" id="statRevenueSub">hari ini</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Item Terjual</div>
      <div class="stat-value green" id="statItems">—</div>
      <div class="stat-sub">porsi hari ini</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Rata-rata Order</div>
      <div class="stat-value" id="statAvg">—</div>
      <div class="stat-sub">per transaksi</div>
    </div>
  </div>

  <!-- ORDER LIST + BEST SELLER -->
  <div class="grid-2">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Order Masuk</span>
        <span class="card-count" id="orderCount">0 order</span>
      </div>
      <div class="order-list" id="orderList">
        <div class="loading">Memuat data...</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">🏆 Menu Terlaris</span>
      </div>
      <div class="menu-list" id="menuList">
        <div class="loading">Memuat data...</div>
      </div>
    </div>
  </div>

  <!-- MEJA ACTIVITY -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">🪑 Aktivitas Meja</span>
    </div>
    <div class="meja-grid" id="mejaGrid">
      <div class="loading">Memuat data...</div>
    </div>
  </div>
</main>

<script>
  // ─── CONFIG ──────────────────────────────────────────────
  const SHEET_ID  = "1bCOnPfmW-Vn8lhrY9jV2VG4X9-755zV6auD4LfcSrLc";
  const CSV_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=Sheet1`;
  // ─────────────────────────────────────────────────────────

  let allOrders   = [];
  let activeDate  = null;

  function formatRp(n) {
    return "Rp " + parseInt(n).toLocaleString("id-ID");
  }

  function parseCSV(text) {
    const lines = text.trim().split("\n").slice(1); // skip header
    return lines.map(line => {
      const cols = [];
      let cur = "", inQ = false;
      for (let c of line) {
        if (c === '"') inQ = !inQ;
        else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
        else cur += c;
      }
      cols.push(cur.trim());
      return {
        nama:   cols[0] || "",
        menu:   cols[1] || "",
        jumlah: parseInt(cols[2]) || 0,
        total:  parseInt(cols[3]) || 0,
        waktu:  cols[4] || "",
        meja:   cols[5] || "Takeaway",
        date:   (cols[4] || "").split(" ")[0] || ""
      };
    }).filter(o => o.nama);
  }

  function getDates(orders) {
    const dates = [...new Set(orders.map(o => o.date))].sort().reverse();
    return dates;
  }

  function renderTabs(dates) {
    const el = document.getElementById("dateTabs");
    el.innerHTML = dates.map((d, i) => `
      <div class="tab ${d === activeDate ? 'active' : ''}" onclick="setDate('${d}')">
        ${i === 0 ? '📅 ' : ''}${d}
      </div>
    `).join('');
  }

  function setDate(date) {
    activeDate = date;
    renderDashboard();
  }

  function renderDashboard() {
    const orders = allOrders.filter(o => o.date === activeDate);
    renderTabs(getDates(allOrders));

    // Stats
    const totalRev   = orders.reduce((s, o) => s + o.total, 0);
    const totalItems = orders.reduce((s, o) => s + o.jumlah, 0);
    const avgOrder   = orders.length ? Math.round(totalRev / orders.length) : 0;

    document.getElementById("statOrders").textContent  = orders.length;
    document.getElementById("statRevenue").textContent = formatRp(totalRev);
    document.getElementById("statItems").textContent   = totalItems;
    document.getElementById("statAvg").textContent     = formatRp(avgOrder);
    document.getElementById("orderCount").textContent  = `${orders.length} order`;

    // Order list (newest first)
    const ol = document.getElementById("orderList");
    if (orders.length === 0) {
      ol.innerHTML = '<div class="empty">Belum ada order hari ini</div>';
    } else {
      ol.innerHTML = [...orders].reverse().map(o => `
        <div class="order-item">
          <div class="order-left">
            <div class="order-nama">${o.nama}</div>
            <div class="order-menu">${o.menu}</div>
            <span class="order-meja">${o.meja || 'Takeaway'}</span>
          </div>
          <div class="order-right">
            <div class="order-total">${formatRp(o.total)}</div>
            <div class="order-time">${o.waktu.split(" ")[1] || o.waktu}</div>
          </div>
        </div>
      `).join('');
    }

    // Best seller
    const menuCount = {};
    orders.forEach(o => {
      o.menu.split(", ").forEach(item => {
        const match = item.match(/^(.+?) x(\d+)$/);
        if (match) {
          const name = match[1].trim();
          const qty  = parseInt(match[2]);
          menuCount[name] = (menuCount[name] || 0) + qty;
        }
      });
    });
    const sorted  = Object.entries(menuCount).sort((a,b) => b[1]-a[1]);
    const maxQty  = sorted[0]?.[1] || 1;
    const rankCls = ["gold", "silver", "bronze"];
    const ml = document.getElementById("menuList");
    if (sorted.length === 0) {
      ml.innerHTML = '<div class="empty">Belum ada data</div>';
    } else {
      ml.innerHTML = sorted.slice(0, 6).map(([name, qty], i) => `
        <div class="menu-row">
          <div class="menu-rank ${rankCls[i] || ''}">${i+1}</div>
          <div class="menu-name">${name}</div>
          <div class="menu-bar-wrap">
            <div class="menu-bar" style="width:${Math.round(qty/maxQty*100)}%"></div>
          </div>
          <div class="menu-count">${qty}x</div>
        </div>
      `).join('');
    }

    // Meja activity
    const mejaData = {};
    orders.forEach(o => {
      const m = o.meja || "Takeaway";
      if (!mejaData[m]) mejaData[m] = { orders: 0, rev: 0 };
      mejaData[m].orders++;
      mejaData[m].rev += o.total;
    });
    const mg = document.getElementById("mejaGrid");
    if (Object.keys(mejaData).length === 0) {
      mg.innerHTML = '<div class="empty">Belum ada data</div>';
    } else {
      mg.innerHTML = Object.entries(mejaData)
        .sort((a,b) => b[1].orders - a[1].orders)
        .map(([meja, data]) => `
          <div class="meja-card">
            <div class="meja-num">${meja}</div>
            <div class="meja-orders">${data.orders}</div>
            <div class="meja-rev">${formatRp(data.rev)}</div>
          </div>
        `).join('');
    }
  }

  async function loadData() {
    try {
      const res  = await fetch(CSV_URL + "&t=" + Date.now());
      const text = await res.text();
      allOrders  = parseCSV(text);

      const dates = getDates(allOrders);
      if (!activeDate || !dates.includes(activeDate)) {
        activeDate = dates[0] || null;
      }

      if (activeDate) renderDashboard();
      else {
        document.getElementById("orderList").innerHTML = '<div class="empty">Belum ada data order</div>';
      }

      document.getElementById("lastUpdate").textContent =
        "Update: " + new Date().toLocaleTimeString("id-ID");

    } catch (err) {
      console.error(err);
      document.getElementById("orderList").innerHTML =
        '<div class="empty">❌ Gagal load data</div>';
    }
  }

  // Load awal + auto refresh tiap 30 detik
  loadData();
  setInterval(loadData, 30000);
</script>
</body>
</html>
